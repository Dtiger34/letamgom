name: CI/CD LegoShop

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Backend
      - name: Install backend
        run: |
          cd backend
          npm install --production

      # Frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Create deploy folder
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          mkdir deploy/public
          cp -r frontend/dist/* deploy/public/

      # Upload artifact
      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: legoshop-build
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: legoshop-build
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_15E9CA4C180E449F82E4115B9E6B7F4A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_15F91C2B348C40018F98FC488F82A530 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F9C62CB14A7D48A9AF2B4BCA3427CB9A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: bambooshop
          package: deploy

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - lientamgom

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Backend
      - name: Install backend
        run: |
          cd backend
          npm install --production

      # Frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Create deploy folder
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          mkdir deploy/public
          cp -r frontend/dist/* deploy/public/

      # Upload artifact
      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: lientamgom-build
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lientamgom-build
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2B1F7ADC62BE42468635CE070EAF9E77 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_45655F16A6B14FEBABF8DE25EF805781 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DDBB0E1FA4AE49B59A00AFE3C2B5C699 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: lientamgom
          package: deploy
